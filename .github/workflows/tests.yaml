# Tests unitaires et qualite de code.
#
# Execute la suite pytest (calculs purs : filtration, chimie, securite) sur
# plusieurs versions de Python, et verifie le formatage et le lint avec ruff.

name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest -q

  lint:
    name: Ruff lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components tests
      - name: Ruff format check
        run: ruff format --check custom_components tests
